<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#090807">
    <meta name="color-scheme" content="dark">
    <title>Память</title>
    <link rel="preload" href="assets/hero.jpg" as="image">
    <link rel="preload" href="assets/cover.jpg" as="image">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
  </head>
  <body class="memory-page">
    <main class="memory-stage" aria-label="Память">
      <div class="memory-visual" aria-hidden="true">
        <img src="assets/hero.jpg" alt="">
      </div>

      <section class="now-playing" aria-label="Аудиоплеер">
        <audio id="memoryAudio" preload="metadata" src="assets/molitva.m4a"></audio>

        <div class="player-shell" data-player>
          <div class="player-cover" aria-hidden="true">
            <img src="assets/cover.jpg" alt="">
          </div>

          <div class="player-content">
            <div class="track-head">
              <p class="track-title">Молитва</p>
              <p class="track-artist">Би-2</p>
            </div>

            <div class="transport-row">
              <button class="play-toggle" type="button" aria-label="Воспроизвести" data-play-toggle>
                <span class="play-icon" aria-hidden="true"></span>
                <span class="pause-icon" aria-hidden="true"></span>
                <span class="loading-ring" aria-hidden="true"></span>
              </button>

              <div class="timeline-group">
                <div class="time-row" aria-hidden="true">
                  <span data-current-time>0:00</span>
                  <span data-duration>0:00</span>
                </div>

                <input
                  class="timeline"
                  type="range"
                  min="0"
                  max="1000"
                  value="0"
                  step="1"
                  aria-label="Временная шкала"
                  data-timeline
                >
              </div>
            </div>
          </div>
        </div>

        <button class="continue-button" type="button" data-continue>
          Продолжить
        </button>
      </section>
    </main>

    <script src="js/app.js" defer></script>
    <script src="js/player.js" defer></script>
  </body>
</html>
